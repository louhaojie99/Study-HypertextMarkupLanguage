<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      article {
        width: 300px;
        height: 300px;
        display: grid;
        /* 按比例 */
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(3, 1fr);
        border: solid 1px blueviolet;
      }
      div {
        background-color: blueviolet;
        border: solid 1px blueviolet;
        background-clip: content-box;
        padding: 10px;
        box-sizing: border-box;
        color: white;
        font-size: 25px;
      }
      /* div:first-child {
        grid-row-start: 1;
        grid-column-start: 1;
        grid-row-end: 2;
        grid-column-end: 5;
      } */
      /* div:first-child {
        grid-row-start: 2;
        grid-column-start: 2;
        grid-row-end: 2;
        grid-column-end: 3;
      } */
      div:first-child {
        grid-row-start: 1;
        grid-column-start: 1;
        grid-row-end: 4;
        grid-column-end: 4;
      }
    </style>
  </head>
  <body>
    <article>
      <div>1</div>
    </article>
  </body>
</html>
